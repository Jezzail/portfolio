<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        background: #0a0a0a;
        color: #eaeaea;
        font-family: system-ui, -apple-system, sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .container {
        text-align: center;
        z-index: 2;
      }

      h1 {
        font-size: 48px;
        margin-bottom: 16px;
        letter-spacing: 1px;
      }

      .highlight {
        color: #22c55e;
      }

      p {
        opacity: 0.7;
        margin-bottom: 24px;
      }

      .loader {
        font-family: monospace;
        font-size: 18px;
        color: #22c55e;
      }

      .dots::after {
        content: "";
        animation: dots 1.5s steps(3, end) infinite;
      }

      @keyframes dots {
        0% { content: ""; }
        33% { content: "."; }
        66% { content: ".."; }
        100% { content: "..."; }
      }

      /* subtle floating gradient blobs */
      .blob {
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #22c55e33, transparent 70%);
        border-radius: 50%;
        filter: blur(60px);
        animation: float 10s infinite alternate ease-in-out;
      }

      .blob:nth-child(1) {
        top: 10%;
        left: 20%;
      }

      .blob:nth-child(2) {
        bottom: 10%;
        right: 20%;
        animation-delay: 2s;
      }

      @keyframes float {
        from {
          transform: translateY(0px) translateX(0px);
        }
        to {
          transform: translateY(-40px) translateX(20px);
        }
      }

      .links a {
        color: #22c55e;
        text-decoration: none;
        margin: 0 10px;
        font-size: 14px;
        opacity: 0.8;
      }

      .links a:hover {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div class="blob"></div>
    <div class="blob"></div>

    <div class="container">
      <h1>
        <span class="highlight">Portfolio</span> rebuilding
      </h1>

      <p>
        I'm working on a new version with better projects and structure.
      </p>

      <div class="loader">
        status: building<span class="dots"></span>
      </div>

      <div class="links" style="margin-top: 30px;">
        <a href="https://github.com/Jezzail" target="_blank">github</a>
        <a href="https://www.linkedin.com/in/pabloabril/" target="_blank">linkedin</a>
      </div>
    </div>
  </body>
</html>
